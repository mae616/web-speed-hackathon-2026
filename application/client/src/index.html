<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <!--
      先行fetchをCSSより前に配置してクリティカルパスを並列化する。
      CSS→API→画像の直列チェーンを、CSS‖APIの並列にすることでLCPを改善。
    -->
    <script>window.__prefetch={};if(location.pathname==="/"){window.__prefetch.posts=fetch("/api/v1/posts").then(function(r){return r.ok?r.json():null}).catch(function(){return null})}</script>
    <!-- カスタムフォントを事前ロードしてFOIT回避・LCP改善 -->
    <link rel="preload" href="/fonts/ReiNoAreMincho-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ReiNoAreMincho-Heavy.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      /* スケルトンUI: Reactマウント前のLCP候補を提供しCLS/FCP/LCPを改善 */
      .sk{display:flex;justify-content:center;background:#f5f5f4;min-height:100vh;font-family:sans-serif}
      .sk-wrap{display:flex;background:#fff;min-height:100vh;max-width:100%;width:100%}
      .sk-nav{width:192px;border-right:1px solid #d6d3d1;padding:8px;display:none}
      .sk-main{flex:1;min-width:0;max-width:640px;padding:16px}
      .sk-item{height:40px;border-radius:9999px;background:#f5f5f4;margin-bottom:8px}
      .sk-card{border-bottom:1px solid #d6d3d1;padding:16px 0}
      .sk-avatar{width:40px;height:40px;border-radius:9999px;background:#d6d3d1;flex-shrink:0}
      .sk-line{height:14px;border-radius:4px;background:#e7e5e4;margin-bottom:8px}
      .sk-line-short{width:40%}
      .sk-line-medium{width:70%}
      .sk-line-long{width:90%}
      .sk-card-row{display:flex;gap:12px}
      .sk-card-body{flex:1;min-width:0}
      @media(min-width:1024px){.sk-nav{display:block}}
      /* SSRコンテンツのFOUC防止: CSSロード前でもレイアウトが安定するよう最低限のスタイルを適用 */
      #app{max-width:1280px;margin:0 auto}
      #app article{max-width:640px;margin:0 auto;padding:8px 16px;line-height:1.625}
      #app h1{font-size:1.875rem;font-weight:700;margin:16px 0 8px}
      #app h2{font-size:1.5rem;font-weight:700;margin:16px 0 8px}
      #app ol{list-style:decimal;padding-left:32px}
    </style>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <div id="app">
      <!--
        スケルトンUI: JSバンドルのロード・パース・実行完了前に表示される。
        ReactのcreateRoot().render()でこのDOM全体が置換される。
        LCP候補としてテキストブロックを含め、CLS防止のためレイアウトを実ページに合わせる。
      -->
      <div class="sk">
        <div class="sk-wrap">
          <aside class="sk-nav">
            <div style="padding-top:16px">
              <div class="sk-item"></div>
              <div class="sk-item"></div>
              <div class="sk-item"></div>
              <div class="sk-item"></div>
            </div>
          </aside>
          <main class="sk-main">
            <div class="sk-card">
              <div class="sk-card-row">
                <div class="sk-avatar"></div>
                <div class="sk-card-body">
                  <p style="color:#042f2e;font-size:14px;line-height:1.625">読み込み中...</p>
                  <div class="sk-line sk-line-long"></div>
                  <div class="sk-line sk-line-medium"></div>
                </div>
              </div>
            </div>
            <div class="sk-card">
              <div class="sk-card-row">
                <div class="sk-avatar"></div>
                <div class="sk-card-body">
                  <div class="sk-line sk-line-short"></div>
                  <div class="sk-line sk-line-medium"></div>
                  <div class="sk-line sk-line-long"></div>
                </div>
              </div>
            </div>
            <div class="sk-card">
              <div class="sk-card-row">
                <div class="sk-avatar"></div>
                <div class="sk-card-body">
                  <div class="sk-line sk-line-short"></div>
                  <div class="sk-line sk-line-long"></div>
                  <div class="sk-line sk-line-short"></div>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
